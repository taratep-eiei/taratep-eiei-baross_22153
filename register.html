<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=undo" />
</head>
<body>
    
   <main class="register-page">
    <div class="register-container">
        <div class="pumblack">
        <a href="index.html">
            <span class="material-symbols-outlined">undo</span></a>
    </div>
        <h2>สมัครสมาชิก</h2>
        <form action="/register" method="POST">
            <div class="input-group">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" name="reg_user" maxlength="15" placeholder="Full Name (maxlength15)" required>
            </div>
            <div class="input-group">
                <label>รหัสผ่าน</label>
                <input type="password" name="reg_pass" maxlength="15" placeholder="Password (maxlength15)" required>
            </div>
            <div class="input-group">
                <label>ยืนยันรหัสผ่าน</label>
                <input type="password" name="reg_confirm_pass" maxlength="15" placeholder="Confirm Password (maxlength15)" required>
            </div>
            
            <button type="submit" class="register-btn">สร้างบัญชี</button>
        </form>
        
        <p class="login-link">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBF5t68YK-QDAC026L6c_OFYeCP-y3RHoA",
        authDomain: "wep-project-by-baross.firebaseapp.com",
        databaseURL: "https://wep-project-by-baross-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "wep-project-by-baross",
        storageBucket: "wep-project-by-baross.firebasestorage.app",
        messagingSenderId: "561116818071",
        appId: "1:561116818071:web:111006b44f0d0e8b3d57d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');

    if (status) {
        let message = '';
        if (status === 'mismatch') message = 'รหัสผ่านไม่ตรงกันนะบอส! ลองเช็กอีกรอบครับ';
        else if (status === 'exists') message = 'ชื่อนี้มีคนใช้แล้วครับบอส! ลองเปลี่ยนชื่อดูนะ';

        if (message) {
            const alertBox = document.createElement('div');
            alertBox.className = 'custom-alert';
            alertBox.innerHTML = `<span>${message}</span><div class="progress-bar progress-active"></div>`;
            document.body.appendChild(alertBox);

            // ส่ง Log รายงานปัญหาการสมัคร
            push(ref(db, 'auth_logs'), { action: "Register Failed", cause: status, time: new Date().toLocaleString('th-TH') });

            setTimeout(() => {
                alertBox.style.opacity = '0';
                setTimeout(() => alertBox.remove(), 500);
            }, 2000);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }
</script>

</body>
</html>
