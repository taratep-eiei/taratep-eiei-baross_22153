<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก</title>
    <link rel="stylesheet" href="style-login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=undo" />
</head>
<body>
    
<main class="register-page">
    <div class="register-container">
        <!-- 🔙 ปุ่มย้อนกลับ (เน้นให้กดง่ายขึ้น) -->
        <div class="pumblack">
            <a href="login.html" id="back-to-login">
                <span class="material-symbols-outlined">undo</span>
            </a>
        </div>
        
        <h2>สมัครสมาชิก</h2>
        
        <div id="register-form-box">
            <div class="input-group">
                <label>ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="reg_user" maxlength="15" placeholder="Username (max15)" required>
            </div>
            <div class="input-group">
                <label>รหัสผ่าน</label>
                <input type="password" id="reg_pass" maxlength="15" placeholder="Password (max15)" required>
            </div>
            <div class="input-group">
                <label>ยืนยันรหัสผ่าน</label>
                <input type="password" id="reg_confirm_pass" maxlength="15" placeholder="Confirm Password" required>
            </div>
            
            <button type="button" id="btn-create-acc" class="register-btn">สร้างบัญชี</button>
        </div>
        
        <!-- 🔗 ปุ่มเข้าสู่ระบบ (จุดที่มีปัญหา) -->
        <p class="login-link">
            มีบัญชีอยู่แล้ว? <a href="login.html" id="direct-login-link">เข้าสู่ระบบ</a>
        </p>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, set, get, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBF5t68YK-QDAC026L6c_OFYeCP-y3RHoA",
        authDomain: "wep-project-by-baross.firebaseapp.com",
        databaseURL: "https://wep-project-by-baross-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "wep-project-by-baross",
        storageBucket: "wep-project-by-baross.firebasestorage.app",
        messagingSenderId: "561116818071",
        appId: "1:561116818071:web:111006b44f0d0e8b3d57d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 🟢 ระบบสมัครสมาชิก (เน้นวาร์ปชัวร์) ---
    document.getElementById('btn-create-acc').onclick = async () => {
        const user = document.getElementById('reg_user').value.trim();
        const pass = document.getElementById('reg_pass').value;
        const confirmPass = document.getElementById('reg_confirm_pass').value;

        if (!user || !pass || !confirmPass) {
            alert("กรุณากรอกข้อมูลให้ครบ!");
            return;
        }
        if (pass !== confirmPass) {
            alert("รหัสผ่านไม่ตรงกัน!");
            return;
        }

        const userRef = ref(db, 'users/' + user);

        try {
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                alert("ชื่อนี้มีคนใช้แล้ว!");
                return;
            }

            // บันทึกข้อมูล
            await set(userRef, {
                password: pass,
                reg_date: new Date().toLocaleString('th-TH')
            });
            
            // ส่ง Log
            await push(ref(db, 'auth_logs'), { action: "Register Success", user: user });

            // วาร์ปทันที (หน้า Login จะเป็นคนทำแถบโหลดเอง)
            window.location.href = "login.html?status=registered";

        } catch (error) {
            alert("เกิดข้อผิดพลาด: " + error.message);
        }
    };

    // ✅ Force Click: ถ้า Link ธรรมดาไม่ไป ให้ใช้ JS สั่งวาร์ป
    document.getElementById('direct-login-link').onclick = (e) => {
        window.location.href = "login.html";
    };
    document.getElementById('back-to-login').onclick = (e) => {
        window.location.href = "login.html";
    };
</script>
</body>
</html>
