<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link rel="stylesheet" href="style-login.css">
    <link rel="stylesheet" href="alert-style.css"> <!-- ✅ ตรวจสอบไฟล์ CSS นี้ด้วยนะครับ -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=undo" />
</head>
<body>
    
<main class="login-page">
    <div class="login-container">
        <div class="pumblack">
            <a href="index.html">
                <span class="material-symbols-outlined">undo</span>
            </a>
        </div>
        <div class="pum"><h2>เข้าสู่ระบบ</h2></div>
        
        <div id="login-form">
            <div class="input-group">
                <label>ชื่อผู้ใช้งาน</label>
                <input type="text" id="username-input" placeholder="Username" required>
            </div>
            <div class="input-group">
                <label>รหัสผ่าน</label>
                <input type="password" id="password-input" placeholder="Password" required>
            </div>
            <button type="button" id="login-btn-main" class="login-btn">Login</button>
        </div>
        <p class="register-link">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get, child, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBF5t68YK-QDAC026L6c_OFYeCP-y3RHoA",
        authDomain: "wep-project-by-baross.firebaseapp.com",
        databaseURL: "https://wep-project-by-baross-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "wep-project-by-baross",
        storageBucket: "wep-project-by-baross.firebasestorage.app",
        messagingSenderId: "561116818071",
        appId: "1:561116818071:web:111006b44f0d0e8b3d57d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 🟢 ฟังก์ชันแจ้งเตือนแบบมีแถบโหลด (Progress Bar) ---
    function showCustomAlert(message) {
        const alertBox = document.createElement('div');
        alertBox.className = 'custom-alert';
        // ใช้โครงสร้างเป๊ะๆ ที่หลอดโหลดเคยทำงาน
        alertBox.innerHTML = `<span>${message}</span><div class="progress-bar progress-active"></div>`;
        document.body.appendChild(alertBox);

        setTimeout(() => {
            alertBox.style.opacity = '0';
            setTimeout(() => alertBox.remove(), 500);
        }, 2500);
    }

    // --- ส่วนแจ้งเตือนสมัครสมาชิกสำเร็จ ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('status') === 'registered') {
        showCustomAlert("สมัครสมาชิกสำเร็จ! เข้าสู่ระบบได้เลย");
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // --- ส่วนควบคุมการ Login ---
    const loginBtn = document.getElementById('login-btn-main');

    if (loginBtn) {
        loginBtn.onclick = async () => {
            const username = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value;

            if (username === "" || password === "") {
                showCustomAlert("กรุณากรอกข้อมูลให้ครบครับบอส!");
                return;
            }

            try {
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `users/${username}`));

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    if (userData.password === password) {
                        localStorage.setItem('savedUsername', username);
                        
                        push(ref(db, 'auth_logs'), { 
                            action: "Login Success", 
                            user: username, 
                            time: new Date().toLocaleString('th-TH') 
                        });

                        showCustomAlert("ยินดีต้อนรับครับบอส!");
                        
                        // ✅ รอหลอดโหลดวิ่งจบก่อนค่อยวาร์ป
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 2800);
                    } else {
                        showCustomAlert("รหัสผ่านไม่ถูกต้องนะบอส เช็กอีกทีครับ!");
                    }
                } else {
                    showCustomAlert("ไม่พบชื่อผู้ใช้งานนี้ในระบบครับ!");
                }
            } catch (error) {
                console.error(error);
                showCustomAlert("เกิดข้อผิดพลาดในการเชื่อมต่อครับ");
            }
        };
    }
</script>
</body>
</html>
