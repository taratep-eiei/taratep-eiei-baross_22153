<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=undo" />
</head>
<body>
    
    <main class="login-page">
    <div class="login-container">
        <div class="pumblack">
            <a href="index.html">
                <span class="material-symbols-outlined">undo</span>
            </a>
        </div>
        <div class="pum"><h2>เข้าสู่ระบบ</h2></div>
        
        <!-- เอา action ออกเพื่อให้ JS ทำงานแทนครับบอส -->
        <form id="login-form">
            <div class="input-group">
                <label>ชื่อผู้ใช้งาน</label>
                <!-- เพิ่ม id="username-input" -->
                <input type="text" id="username-input" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <label>รหัสผ่าน</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <!-- เพิ่ม id="login-btn-main" -->
            <button type="submit" id="login-btn-main" class="login-btn">Login</button>
        </form>
        <p class="register-link">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
    </div>
</main>
<link rel="stylesheet" href="alert-style.css">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBF5t68YK-QDAC026L6c_OFYeCP-y3RHoA",
        authDomain: "wep-project-by-baross.firebaseapp.com",
        databaseURL: "https://wep-project-by-baross-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "wep-project-by-baross",
        storageBucket: "wep-project-by-baross.firebasestorage.app",
        messagingSenderId: "561116818071",
        appId: "1:561116818071:web:111006b44f0d0e8b3d57d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- ส่วนแจ้งเตือนสมัครสมาชิกสำเร็จ ---
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');

    if (status === 'registered') {
        const alertBox = document.createElement('div');
        alertBox.className = 'custom-alert';
        alertBox.innerHTML = `<span>สมัครสมาชิกสำเร็จ! เข้าสู่ระบบได้เลย</span><div class="progress-bar progress-active"></div>`;
        document.body.appendChild(alertBox);

        push(ref(db, 'auth_logs'), { action: "Register Success", time: new Date().toLocaleString('th-TH') });

        setTimeout(() => {
            alertBox.style.opacity = '0';
            setTimeout(() => alertBox.remove(), 500);
        }, 2000);
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // --- ส่วนควบคุมการ Login ---
    const loginBtn = document.getElementById('login-btn-main');
    const userInput = document.getElementById('username-input');

    if (loginBtn) {
        loginBtn.addEventListener('click', (e) => {
            e.preventDefault(); // กันหน้าเว็บรีเฟรชก่อนบันทึกข้อมูล
            
            const username = userInput ? userInput.value : "";

            if (username.trim() !== "") {
                // 1. บันทึกชื่อลงเครื่อง
                localStorage.setItem('savedUsername', username);
                
                // 2. ส่ง Log ไป Firebase
                push(ref(db, 'auth_logs'), { 
                    action: "Login Success", 
                    user: username, 
                    time: new Date().toLocaleString('th-TH') 
                });

                // 3. วาร์ปไปหน้าหลัก
                window.location.href = "index.html";
            } else {
                alert("กรุณากรอกชื่อผู้ใช้งานด้วยครับบอส!");
            }
        });
    }
</script>
</main>
</body>
</html>
