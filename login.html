<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=undo" />
</head>
<body>
    
    <main class="login-page">
    <div class="login-container">
        
        <div class="pumblack">
        <a href="index.html">
            <span class="material-symbols-outlined">undo</span></a>
    </div>
    <div class="pum" ><h2>เข้าสู่ระบบ</h2></div>
        <form action="/login" method="POST">
            <div class="input-group">
                <label>ชื่อผู้ใช้งาน</label>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <label>รหัสผ่าน</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <p class="register-link">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
    </div>

    <link rel="stylesheet" href="alert-style.css">

<script>
    const urlParams = new URLSearchParams(window.location.search);
    
    if (urlParams.get('status') === 'registered') {
        // สร้างกล่องแจ้งเตือน
        const alertBox = document.createElement('div');
        alertBox.className = 'custom-alert';
        alertBox.innerHTML = `
            <span>สมัครสมาชิกสำเร็จ! เข้าสู่ระบบได้เลย</span>
            <div class="progress-bar progress-active"></div>
        `;
        
        document.body.appendChild(alertBox);

        // ตั้งเวลา 2 วินาที (เท่ากับ Animation) แล้วให้หายไป
        setTimeout(() => {
            alertBox.style.opacity = '0';
            setTimeout(() => alertBox.remove(), 500);
        }, 2000);
    }
</script>
</main>
</body>
</html>
