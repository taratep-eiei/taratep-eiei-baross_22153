<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* สไตล์คร่าวๆ ให้บอสเอาไปปรับใช้ครับ */
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
        .auth-container { background: #2a2a2a; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #4b7bec; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #3867d6; }
        .switch-text { font-size: 12px; text-align: center; margin-top: 15px; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 id="auth-title">เข้าสู่ระบบ</h2>
        <!-- ✅ จุดตาย: พี่เอา action และ method="POST" ออก เพื่อกัน Error 405 -->
        <div id="auth-form">
            <input type="text" id="username" placeholder="ชื่อผู้ใช้ (Username)" required>
            <input type="password" id="password" placeholder="รหัสผ่าน" required>
            <button type="button" id="submit-btn">ตกลง</button>
        </div>
        <p class="switch-text" id="switch-mode">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // Config เดิมของบอส
    const firebaseConfig = {
        apiKey: "AIzaSyBF5t68YK-QDAC026L6c_OFYeCP-y3RHoA",
        authDomain: "wep-project-by-baross.firebaseapp.com",
        databaseURL: "https://wep-project-by-baross-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "wep-project-by-baross",
        storageBucket: "wep-project-by-baross.firebasestorage.app",
        messagingSenderId: "561116818071",
        appId: "1:561116818071:web:111006b44f0d0e8b3d57d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let isLoginMode = true;

    // --- สลับโหมด สมัคร/ล็อกอิน ---
    const switchBtn = document.getElementById('switch-mode');
    const authTitle = document.getElementById('auth-title');
    
    switchBtn.onclick = () => {
        isLoginMode = !isLoginMode;
        authTitle.innerText = isLoginMode ? "เข้าสู่ระบบ" : "สมัครสมาชิก";
        switchBtn.innerText = isLoginMode ? "ยังไม่มีบัญชี? สมัครสมาชิกที่นี่" : "มีบัญชีแล้ว? เข้าสู่ระบบ";
    };

    // --- ระบบจัดการข้อมูล (หัวใจหลักที่แก้ 405) ---
    document.getElementById('submit-btn').onclick = async () => {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (!user || !pass) return alert("กรุณากรอกข้อมูลให้ครบครับบอส!");

        const userRef = ref(db, 'users/' + user);

        if (isLoginMode) {
            // 🔓 โหมด Login
            try {
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password === pass) {
                        localStorage.setItem('savedUsername', user); // เก็บชื่อไว้ใช้หน้า index
                        alert("เข้าสู่ระบบสำเร็จ!");
                        window.location.href = "index.html"; // วิ่งกลับหน้าหลัก
                    } else {
                        alert("รหัสผ่านไม่ถูกต้อง!");
                    }
                } else {
                    alert("ไม่พบชื่อผู้ใช้นี้ครับ!");
                }
            } catch (error) { alert("เกิดข้อผิดพลาด: " + error.message); }
        } else {
            // 📝 โหมดสมัครสมาชิก
            try {
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    alert("ชื่อผู้ใช้นี้มีคนใช้แล้วครับบอส!");
                } else {
                    await set(userRef, { password: pass });
                    alert("สมัครสมาชิกสำเร็จ! ลองล็อกอินดูครับ");
                    location.reload();
                }
            } catch (error) { alert("สมัครไม่สำเร็จ: " + error.message); }
        }
    };
</script>
</body>
</html>
