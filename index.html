<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Webpage</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Language" content="th">
</head>
<body>
    
    <header>
        <h1>เว็บเพจของฉัน</h1> 
    </header> 

    <nav>
        <div style="flex:1;"></div>

        <div style="flex:1; display:flex; justify-content:center;">
            <div class="Home"><a href="index.html">Home</a> <span class="step-line">|</span></div>
            <div class="About"><a href="#">About</a> <span class="step-line">|</span></div>
            <div class="Services"><a href="#">Services</a> <span class="step-line">|</span></div>
            <div class="Contact"><a href="#">Contact</a></div>
        </div>

        <div style="flex:1; display:flex; justify-content:flex-end; align-items: center; padding-right: 20px;">
            <a href="login.html" class="nav-link" id="login-btn">
                <img src="" id="nav-profile-img" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 8px; display: none;">
                <span id="nav-username">เข้าสู่ระบบ</span>
            </a>
            <a href="javascript:void(0)" id="logout-btn" style="display: none; margin-left: 15px; text-decoration: none;">
                <span class="material-symbols-outlined" style="vertical-align: middle; color: #ff4b4b;">logout</span>
            </a>
        </div>
    </nav>

    <div id="mySidebar" class="sidebar" style="width: 0; overflow-x: hidden; transition: 0.5s;">
        <div class="sidebar-content">
            <div class="profile-section">
                <label for="upload-photo" class="upload-label">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Baross" alt="Profile" class="side-img" id="main-profile-img">
                    <div class="upload-text">คลิกเพื่อเปลี่ยนรูป</div>
                </label>
                <input type="file" id="upload-photo" style="display:none" accept="image/*">
                <h2 id="side-username">Guest</h2>
                <p id="side-status" class="status-text">Online</p>
            </div>
            <hr class="sidebar-divider">
            <div class="sidebar-info-card">
                <p class="info-card-title">User Dashboard</p>
                <p class="info-card-detail">ยินดีต้อนรับสู่ระบบจัดการส่วนตัว</p>
            </div>
        </div>
    </div>

    <main>
        <section class="main-container">
            <h2 class="main-title">ยินดีต้อนรับสู่เว็บเพจของฉัน</h2>
            <p class="main-info">ระบบ Dashboard ส่วนตัวที่จัดการได้ผ่านเมนูข้างชื่อของคุณ</p>
            <a href="#" class="main-btn">เรียนรู้เพิ่มเติม</a> 
        </section>

        <div class="photo-spread-section">
            <div class="photo-container" id="photoStack">
                <div class="stack-image img-left-far" onclick="switchPhoto(this)"><img src="img1.jpg"></div>
                <div class="stack-image img-left" onclick="switchPhoto(this)"><img src="img2.jpg"></div>
                <div class="stack-image img-center" onclick="switchPhoto(this)"><img src="img3.jpg"></div>
                <div class="stack-image img-right" onclick="switchPhoto(this)"><img src="img4.jpg"></div>
                <div class="stack-image img-right-far" onclick="switchPhoto(this)"><img src="img5.jpg"></div>
            </div>
        </div>
    </main>

    <footer><p>&copy; 2026 baross. All rights reserved.</p></footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBF5t68YK-QDAC026L6c_OFYeCP-y3RHoA",
        authDomain: "wep-project-by-baross.firebaseapp.com",
        databaseURL: "https://wep-project-by-baross-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "wep-project-by-baross",
        storageBucket: "wep-project-by-baross.firebasestorage.app",
        messagingSenderId: "561116818071",
        appId: "1:561116818071:web:111006b44f0d0e8b3d57d2"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const updateProfileUI = (name, photoData) => {
        const navUser = document.getElementById('nav-username');
        const sideUser = document.getElementById('side-username');
        const navProfileImg = document.getElementById('nav-profile-img');
        const mainProfileImg = document.getElementById('main-profile-img');

        if (name) {
            if (navUser) navUser.innerText = name;
            if (sideUser) sideUser.innerText = name;
        }

        if (photoData) {
            if (mainProfileImg) mainProfileImg.src = photoData;
            if (navProfileImg) {
                navProfileImg.src = photoData;
                navProfileImg.style.display = "inline-block";
            }
        } else {
            if (mainProfileImg) mainProfileImg.src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Baross";
            if (navProfileImg) navProfileImg.style.display = "none";
        }
    };

    const initApp = () => {
        const savedName = localStorage.getItem('savedUsername');
        const loginBtn = document.getElementById('login-btn');
        const sidebar = document.getElementById("mySidebar");
        const uploadInput = document.getElementById('upload-photo');

        if (savedName) {
            // 🔥 ดึงรูปเฉพาะของ User นั้นๆ
            const userSpecificImg = localStorage.getItem('userProfilePic_' + savedName);
            updateProfileUI(savedName, userSpecificImg);

            loginBtn.href = "javascript:void(0)";
            loginBtn.onclick = (e) => {
                e.preventDefault();
                sidebar.style.width = "320px";
            };
            document.getElementById('logout-btn').style.display = "inline-block";
        } else {
            updateProfileUI("เข้าสู่ระบบ", null);
        }

        if (uploadInput) {
            uploadInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file && savedName) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imageData = event.target.result;
                        updateProfileUI(null, imageData);
                        // 🔥 เซฟรูปแยกตามชื่อ User
                        localStorage.setItem('userProfilePic_' + savedName, imageData);
                    };
                    reader.readAsDataURL(file);
                }
            };
        }
    };

    initApp();

    // 🔥 จุดแก้: ล้างแค่ชื่อออก แต่ห้ามล้าง localStorage ทั้งหมด หรือลบรูปทิ้ง
    document.getElementById('logout-btn').onclick = () => {
        localStorage.removeItem('savedUsername'); // ลบแค่ว่าใครกำลังใช้อยู่
        location.reload(); // รีโหลดเพื่อกลับไปสถานะ "ไม่ได้ล็อกอิน"
    };
</script>
</body>
</html>
